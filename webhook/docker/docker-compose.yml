services:
  # === PHP (FPM) ルート：Nginx → PHP-FPM ===========================
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"                    # http://localhost:8080 → Nginx 経由
    volumes:
      - ../public:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .                    # docker-compose.yml があるディレクトリ
      dockerfile: ./php-fpm.Dockerfile
    image: webhook-php-fpm-apcu     # 好きな名前でOK（タグ）
    working_dir: /var/www/html
    volumes:
      - ../public:/var/www/html
    environment:                       # ← ここを追加
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"

  # === PHP (非FPM) ルート：Apache(mod_php) 直配信 ====================
  php-apache:
    image: php:8.2-apache
    ports:
      - "8081:80"                    # http://localhost:8081
    working_dir: /var/www/html
    volumes:
      - ../public:/var/www/html

  # === Python: Flask + Gunicorn =====================================
  python:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../python:/app
    command: >
      sh -c "pip install --no-cache-dir flask gunicorn python-dotenv &&
             gunicorn app:app -w 2 -k gthread -b 0.0.0.0:8000"
    ports:
      - "8000:8000"                  # http://localhost:8000
    environment:
      # 必要に応じてLINEのシークレット/トークンを渡す
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"
      PYTHONUNBUFFERED: "1"
    # healthcheck:  # ← 今回は不要。使わないなら丸ごとコメントアウト推奨
    #   test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3

# === Node: Express =================================================
  node:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ../node:/usr/src/app
    command: >
      sh -c "npm i && npm run build && node dist/webhook.js"
    ports:
      - "3000:3000"
    environment:
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"
